services:
  mcp-obsidian:
    image: ghcr.io/lebretont/mcp-obsidian:sha-5520bd1
    restart: unless-stopped
    environment:
      MCP_HTTP_ADDR: ":8080"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET}
      OAUTH_GITHUB_ALLOWED_USERS: ${OAUTH_GITHUB_ALLOWED_USERS}
      OAUTH_SQLITE_PATH: /data/oauth.db
      OBSIDIAN_VAULT_PATH: /vault
      ALLOW_DELETE: ${ALLOW_DELETE:-false}
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_SYNC_INTERVAL_MINUTES: ${S3_SYNC_INTERVAL_MINUTES:-10}
      S3_SYNC_DELETE: ${S3_SYNC_DELETE:-false}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - obsidian-vault:/vault
      - obsidian-mcp-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  obsidian-vault:
  obsidian-mcp-data:
